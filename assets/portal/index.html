<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline Knowledge Hub</title>
    <style>
      /* ── Fonts (self-hosted subset via Google Fonts CSS import is intentionally
        omitted for offline use; we fall back to a refined system stack) ── */
      @import url("https://fonts.bunny.net/css?family=space-grotesk:400,600,700|instrument-serif:400i");

      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --border: #30363d;
        --accent: #2ea043;
        --accent2: #1f6feb;
        --text: #e6edf3;
        --muted: #8b949e;
        --radius: 16px;
        --card-w: 320px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Space Grotesk", system-ui, sans-serif;
        overflow-x: hidden;
      }

      /* ── Noise texture overlay ───────────────────────────────────────────── */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* ── Header ─────────────────────────────────────────────────────────── */
      header {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 56px 24px 32px;
        text-align: center;
      }

      header .eyebrow {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 10px;
      }

      header h1 {
        font-size: clamp(2rem, 5vw, 3.2rem);
        font-weight: 700;
        line-height: 1.1;
        background: linear-gradient(135deg, #e6edf3 30%, #58a6ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      header .subtitle {
        margin-top: 12px;
        color: var(--muted);
        font-size: 1rem;
        max-width: 520px;
        line-height: 1.6;
      }

      /* ── Status bar ──────────────────────────────────────────────────────── */
      #status-bar {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: center;
        gap: 24px;
        flex-wrap: wrap;
        padding: 0 24px 24px;
      }

      .status-chip {
        display: flex;
        align-items: center;
        gap: 7px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 16px;
        font-size: 13px;
        color: var(--muted);
      }
      .status-chip .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .dot-green {
        background: #3fb950;
        box-shadow: 0 0 6px #3fb950aa;
      }
      .dot-red {
        background: #f85149;
      }
      .dot-yellow {
        background: #d29922;
      }

      /* ── Module grid ─────────────────────────────────────────────────────── */
      main {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 24px 64px;
      }

      /* ── Module card ─────────────────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          box-shadow 0.18s ease;
        cursor: default;
        animation: fadeUp 0.4s ease both;
      }
      .card:hover {
        transform: translateY(-4px);
        border-color: #58a6ff55;
        box-shadow: 0 12px 40px #00000066;
      }
      .card.unavailable {
        opacity: 0.42;
        filter: grayscale(0.6);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .card-emoji {
        font-size: 2.2rem;
        line-height: 1;
      }
      .card-name {
        font-size: 1.15rem;
        font-weight: 700;
      }
      .card-desc {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.55;
        flex: 1;
      }

      .card-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: auto;
      }

      .badge {
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 3px 9px;
        border-radius: 999px;
        font-weight: 600;
      }
      .badge-running {
        background: #1a3326;
        color: #3fb950;
        border: 1px solid #2ea04333;
      }
      .badge-stopped {
        background: #21262d;
        color: var(--muted);
        border: 1px solid var(--border);
      }

      .open-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: var(--accent2);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition:
          background 0.15s ease,
          transform 0.1s ease;
        font-family: inherit;
      }
      .open-btn:hover {
        background: #388bfd;
        transform: scale(1.03);
      }
      .open-btn:active {
        transform: scale(0.97);
      }
      .open-btn:disabled,
      .open-btn[aria-disabled="true"] {
        background: #21262d;
        color: var(--muted);
        cursor: not-allowed;
        transform: none;
      }

      /* ── Map card special layout ─────────────────────────────────────────── */
      #map {
        height: 260px;
        border-radius: 10px;
        overflow: hidden;
        margin-top: 4px;
      }

      /* ── Footer ──────────────────────────────────────────────────────────── */
      footer {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 32px;
        color: var(--muted);
        font-size: 12px;
        border-top: 1px solid var(--border);
      }

      /* ── Leaflet overrides ───────────────────────────────────────────────── */
      .leaflet-container {
        background: #1c2128;
      }
    </style>

    <!-- Leaflet (bundled offline copy of leaflet.js / leaflet.css should be placed
     in assets/portal/leaflet/ — fallback to CDN for dev convenience) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>

  <body>
    <header>
      <p class="eyebrow">🏫 Offline Knowledge Hub</p>
      <h1>Everything you need,<br />no internet required.</h1>
      <p class="subtitle">
        Connect to the <strong id="ssid-display">OfflineHub</strong> network,
        open this page in any browser, and explore.
      </p>
    </header>

    <!-- Status chips -->
    <div id="status-bar">
      <div class="status-chip">
        <span class="dot dot-green"></span>
        Hub online
      </div>
      <div class="status-chip" id="ip-chip">
        <span class="dot dot-yellow"></span>
        Loading IP…
      </div>
    </div>

    <!-- Module cards rendered by JS -->
    <main id="cards-container">
      <p style="color: var(--muted); grid-column: 1/-1">Loading modules…</p>
    </main>

    <footer>
      Offline Knowledge Hub &nbsp;·&nbsp; Running locally &nbsp;·&nbsp; No data
      leaves this network.
    </footer>

    <script>
      // ── Helpers ───────────────────────────────────────────────────────────────
      const $ = (id) => document.getElementById(id);

      async function fetchJSON(url) {
        try {
          const r = await fetch(url);
          return r.ok ? r.json() : null;
        } catch {
          return null;
        }
      }

      // ── Resolve IP ────────────────────────────────────────────────────────────
      async function initIP() {
        const data = await fetchJSON("/api/ip");
        const ip = data?.ip ?? window.location.hostname;
        const port = window.location.port ? `:${window.location.port}` : "";
        const url = `http://${ip}${port}`;
        $("ip-chip").innerHTML = `<span class="dot dot-green"></span>${url}`;
      }

      // ── Build cards from live module API ─────────────────────────────────────
      async function buildCards() {
        const modules = (await fetchJSON("/api/modules")) ?? {};
        const container = $("cards-container");
        container.innerHTML = "";

        const entries = Object.entries(modules);
        if (entries.length === 0) {
          container.innerHTML = `<p style="color: var(--muted); grid-column:1/-1">
         No modules installed yet. Ask the administrator to set up content.
       </p>`;
          return;
        }

        entries.forEach(([id, mod], idx) => {
          const running = mod.status === "running";
          const isMap = mod.type === "mbtiles";

          const card = document.createElement("div");
          card.className = "card" + (running ? "" : " unavailable");
          card.style.animationDelay = `${idx * 80}ms`;

          if (isMap && running) {
            card.innerHTML = `
        <div class="card-header">
          <span class="card-emoji">${mod.emoji}</span>
          <span class="card-name">${mod.name}</span>
        </div>
        <p class="card-desc">${mod.description}</p>
        <div id="map-${id}"></div>
        <div class="card-meta">
          <span class="badge badge-running">● Running</span>
        </div>`;
            container.appendChild(card);
            initMap(id);
          } else {
            const openURL =
              running && mod.port
                ? `http://${window.location.hostname}:${mod.port}`
                : "#";

            card.innerHTML = `
        <div class="card-header">
          <span class="card-emoji">${mod.emoji}</span>
          <span class="card-name">${mod.name}</span>
        </div>
        <p class="card-desc">${mod.description || ""}</p>
        <div class="card-meta">
          <span class="badge ${running ? "badge-running" : "badge-stopped"}">
            ${running ? "● Running" : "● Not started"}
          </span>
          <a class="open-btn"
             href="${openURL}"
             target="_blank"
             ${!running ? 'aria-disabled="true" tabindex="-1"' : ""}>
            Open ↗
          </a>
        </div>`;
            container.appendChild(card);
          }
        });
      }

      // ── Leaflet map ───────────────────────────────────────────────────────────
      function initMap(moduleId) {
        const leafletMap = L.map(`map-${moduleId}`, {
          zoomControl: true,
        }).setView([51.5, 10], 4);
        L.tileLayer(`/tiles/${moduleId}/{z}/{x}/{y}.png`, {
          maxZoom: 18,
          attribution: "© OpenStreetMap contributors",
          tileSize: 256,
        }).addTo(leafletMap);
      }

      // ── Auto-refresh every 30s ────────────────────────────────────────────────
      async function init() {
        await Promise.all([initIP(), buildCards()]);
      }

      init();
      setInterval(buildCards, 30_000);
    </script>
  </body>
</html>
